<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miazii Shop - Offline</title>
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8fafc;
            text-align: center;
            color: #334155;
        }
        .container {
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 90%;
            width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #fed700;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        button {
            background-color: #fed700;
            color: #0f172a;
            border: none;
            padding: 14px 30px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Connection Lost</h1>
        <p>You appear to be offline. Please check your internet connection and try again to continue shopping.</p>
        <button onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
