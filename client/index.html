      /* INSTANT NATIVE MASK: Hides the Chrome bar with the theme color immediately */
      html, body {
        background-color: #fed700 !important;
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      #root-mask {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #fed700;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      .loader-text {
        color: #000;
        font-family: sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        animation: pulse 1.5s infinite ease-in-out;
      }
      @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
      .mask-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
